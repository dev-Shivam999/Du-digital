server {
    listen 80;
    server_name dudigitalglobal.com www.dudigitalglobal.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dudigitalglobal.com www.dudigitalglobal.com;

    # ── SSL ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/dudigitalglobal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dudigitalglobal.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Static files — served directly by Nginx (no Node involved) ───────────

    # Built JS/CSS chunks (hashed filenames — cache forever)
    location /assets/ {
        root /var/www/du-digital/client/dist;
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Public folder assets (images, fonts, icons)
    location ~* \.(jpg|jpeg|png|gif|svg|ico|webp|avif|woff|woff2|otf|ttf|eot|pdf|mp4)$ {
        root /var/www/du-digital/client/dist;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        # Fallback to public/ if not in dist/
        try_files $uri /public$uri =404;
    }

    # Backend uploads (images uploaded via admin)
    location /uploads/ {
        alias /var/www/du-digital/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Backend API — proxy to Express ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SSR — all other requests go to Node ──────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
